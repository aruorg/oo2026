<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material and Energy</title>

<!-- Your compiled JS from TypeScript -->
<script src="materials_copy.js"></script>

<script>

let waterpot = null;
let ironRadiator = null;
let airInRoom = null;

function startPage(){
    document.getElementById("output").innerText = "Insert information";
}

function createMaterials(){

    waterpot = new Material(
        Number(document.getElementById("waterMass").value),
        Number(document.getElementById("waterSch").value),
        Number(document.getElementById("waterTemp").value)
    );

    ironRadiator = new Material(
        Number(document.getElementById("ironMass").value),
        Number(document.getElementById("ironSch").value),
        Number(document.getElementById("ironTemp").value)
    );

    airInRoom = new AirAmount(
        Number(document.getElementById("length").value),
        Number(document.getElementById("width").value),
        Number(document.getElementById("height").value),
        Number(document.getElementById("airTemp").value)
    );

    document.getElementById("output").innerText = "Objects created!";
}

function transferHeatStep(){

    if(!waterpot || !ironRadiator) return;
    let k = 0.5;
    let dt = 60;    // time step (minute)

    let IronAirDiff = ironRadiator.CurrentTemperature() - airInRoom.CurrentTemperature();
    let energyIronAir = k * IronAirDiff * dt;

    ironRadiator.EnergyChange(-energyIronAir);
    airInRoom.EnergyChange(energyIronAir);

    let WaterAirDiff = waterpot.CurrentTemperature() - airInRoom.CurrentTemperature();
    let energyWaterAir = k * WaterAirDiff * dt;

    waterpot.EnergyChange(-energyWaterAir);
    airInRoom.EnergyChange(energyWaterAir);

     document.getElementById("output").innerText =
        "Water: " + waterpot.CurrentTemperature().toFixed(2) + " °C\n" +
        "Iron: " + ironRadiator.CurrentTemperature().toFixed(2) + " °C\n" +
        "Air: " + airInRoom.CurrentTemperature().toFixed(2) + " °C";
}

function calculateEqualTemperature(){

    if(!waterpot || !ironRadiator || !airInRoom) return;

    let temp = EqualTemp([waterpot, ironRadiator, airInRoom]);

    document.getElementById("output").innerText =
        "Equal temperature: " + temp.toFixed(2) + " °C";
}

</script>
</head>

<body onload="startPage()">

<h1>Material heating</h1>

<h2 id="output"></h2>

<h3>Water</h3>
<label>Mass (kg):</label>
<input type="number" id="waterMass"><br>

<label>Specific heat capacity:</label>
<input type="number" id="waterSch"><br>

<label>Initial temperature (°C):</label>
<input type="number" id="waterTemp"><br>


<h3>Iron</h3>
<label>Mass (kg):</label>
<input type="number" id="ironMass"><br>

<label>Specific heat capacity:</label>
<input type="number" id="ironSch"><br>

<label>Initial temperature (°C):</label>
<input type="number" id="ironTemp"><br>


<h3>Air</h3>
<label>Room width (m):</label>
<input type="number" id="width"><br>

<label>Room length (m):</label>
<input type="number" id="length"><br>

<label>Room height (m):</label>
<input type="number" id="height"><br>

<label>Initial temperature (°C):</label>
<input type="number" id="airTemp"><br>


<br>
<button onclick="createMaterials()">Create materials</button><br>
<button onclick="transferHeatStep()">Transfer heat 1 minute</button><br>
<button onclick="calculateEqualTemperature()">Calculate equal temperature</button><br>

</body>
</html>
